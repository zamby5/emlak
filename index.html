      31:{mod:'MOD 07',title:'90-Gün Gelişim',topic:'Referral & Marka',content:`<h3>📋 HFT 9-12: Sosyal & Referral</h3><p>• Instagram aktif<br>• Referral broadcast<br>• Email newsletter 2x/hafta</p><p><b>GELİR:</b> ₺15-25K → ₺35-50K (3 ay)</p>`,task:`<h4>Görev: Instagram setup</h4>`,case:`<h4>Vaka: 90 gün: Marka kuruldu</h4>`},
      32:{mod:'MOD 07',title:'Sistem Maturity (120+ Gün)',topic:'Ölçeklendirme',content:`<h3>📊 KPİ KONTROL</h3><p>İlan: %6-8 | Conv: %20-25 | Satış: 1/3 | Süresi: 2-4 hafta</p><p><b>SONRA:</b><br>• Ekip kurma (Junior)<br>• Branş uzmanlaşması<br>• Kişisel marka</p>`,task:`<h4>Görev: KPI'larını tanımla</h4>`,case:`<h4>Vaka: 120 gün: ₺50K+/ay</h4>`},
      33:{mod:'MOD 07',title:'Kişisel Marka & Longevity',topic:'Uzun Vadeli Başarı',content:`<h3>🎨 MARKA PILLERI</h3><p>1. SOSYAL: 1.000+ follower, 2x/hafta<br>2. REFERRAL: "Profesyonel" şöhreti<br>3. CONTENT: Blog, Video<br>4. AĞLAR: Noter, müşteri, yatırımcı</p><h3>✅ SONUÇLAR</h3><p>✅ Müşteri aracısız geliyor<br>✅ Satış +50%<br>✅ Komisyon ↑<br>✅ Stres ↓ (Sistem otonom)</p>`,task:`<h4>Görev: Uzun vadeli marka stratejisi</h4>`,case:`<h4>Vaka: Marka → ₺80K+/ay</h4>`},
    };

    function toggleAPI() {
      document.getElementById('apiModal').classList.toggle('active');
      document.getElementById('apiOverlay').classList.toggle('active');
    }

    function closeAPI() {
      document.getElementById('apiModal').classList.remove('active');
      document.getElementById('apiOverlay').classList.remove('active');
    }

    function saveAPI() {
      const key = document.getElementById('apiKey').value.trim();
      if (key) {
        localStorage.setItem('apiKey', key);
        apiKey = key;
        closeAPI();
        alert('✅ Kaydedildi');
      }
    }

    function renderHome() {
      const total = 33;
      const progress = Math.round((completed.length / total) * 100);
      let html = `
        <div class="hero">
          <h2>Claude Coach Complete</h2>
          <p style="color:#b8932a;font-size:1.125rem">33 GÜNLÜK PROGRAM</p>
          <p style="margin:1rem 0;font-size:.875rem;color:#cbd5e1">📊 ${progress}% • ${completed.length}/${total} Gün<br>✅ 28 Coaching + 5 Legal</p>
          <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
        </div>
      `;

      const sections = [
        {title: '📚 MOD 01 — İLANLAR (1-7)', days: [1,2,3,4,5,6,7]},
        {title: '👥 MOD 02 — MÜŞTERILER (8-14)', days: [8,9,10,11,12,13,14]},
        {title: '🎯 MOD 03 — SATIŞ (15)', days: [15]},
        {title: '🚀 MOD 04 — İLERİ (16-21)', days: [16,17,18,19,20,21]},
        {title: '💎 MOD 05 — UZMANLIK (22-23)', days: [22,23]},
        {title: '⚖️ MOD 06 — LEGAL (24-28) ⭐ ZORUNLU', days: [24,25,26,27,28]},
        {title: '📈 MOD 07 — 90-GÜN (29-33)', days: [29,30,31,32,33]}
      ];

      sections.forEach((sec) => {
        html += `<h3 style="margin:1.5rem 0 .5rem;color:#b8932a">${sec.title}</h3>`;
        sec.days.forEach((day) => {
          const isDone = completed.includes(`d${day}`);
          const lesson = lessons[day];
          const badge = day >= 24 && day <= 28 ? '<span class="badge">LEGAL</span>' : '';
          html += `<div class="card ${isDone?'done':''}" onclick="openLesson(${day})"><div style="display:flex;justify-content:space-between"><div><h3>Gün ${day}</h3><p>${lesson.title}${badge}</p></div><span>${isDone?'✅':'📖'}</span></div></div>`;
        });
      });

      document.getElementById('home').innerHTML = html;
    }

    function openLesson(day) {
      const lesson = lessons[day];
      const isDone = completed.includes(`d${day}`);

      let html = `
        <button class="back-btn" onclick="backHome()">← Geri</button>
        <div class="hero">
          <h2>${lesson.title}</h2>
          <p style="color:#94a3b8;font-size:.875rem">Gün ${day} • ${lesson.topic}</p>
        </div>
        <div class="lesson">${lesson.content}</div>
        <div class="box task-box"><h4>🎯 Görev</h4>${lesson.task}</div>
        <div class="box case-box"><h4>📖 Vaka</h4>${lesson.case}</div>
        <div class="box ai-box">
          <h4>🤖 Groq AI</h4>
          <input type="text" id="q${day}" placeholder="Soru sor..." style="padding:.5rem;width:100%;border:1px solid #475569;background:#334155;border-radius:.5rem;color:#fff;margin-bottom:.5rem">
          <button class="btn btn-primary" onclick="ask(${day})" style="margin:0">Sor</button>
          <div id="r${day}"></div>
        </div>
        <button class="btn ${isDone?'btn-secondary':'btn-primary'}" onclick="mark(${day})" style="margin-top:1rem">
          ${isDone?'✅ Tamamlandı':'✓ Tamamla'}
        </button>
      `;

      document.getElementById('lesson').innerHTML = html;
      document.getElementById('home').classList.remove('active');
      document.getElementById('lesson').classList.add('active');
    }

    async function ask(day) {
      if (!apiKey) {
        alert('API Key ayarla');
        toggleAPI();
        return;
      }

      const q = document.getElementById(`q${day}`).value.trim();
      if (!q) return;

      const r = document.getElementById(`r${day}`);
      r.textContent = 'Groq\'a sorgulanıyor...';
      r.className = 'loading';

      try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            messages: [{
              role: 'user',
              content: `Turyap Queen 2026 Gayrimenkul Coachı. KONU: ${lessons[day].title}. SORU: ${q}. KURALLAR: 2026 Türkiye pazarı. 0 halüsinasyon. Kaynak açık.`
            }],
            max_tokens: 400,
            temperature: 0.6
          })
        });

        if (!res.ok) throw new Error(`API: ${res.status}`);
        const data = await res.json();
        const ans = data.choices[0].message.content;
        r.textContent = ans;
        r.className = 'ai-response';
      } catch (err) {
        r.textContent = `❌ Hata: ${err.message}`;
      }
    }

    function mark(day) {
      if (!completed.includes(`d${day}`)) {
        completed.push(`d${day}`);
        localStorage.setItem('completed', JSON.stringify(completed));
      }
      openLesson(day);
    }

    function backHome() {
      document.getElementById('lesson').classList.remove('active');
      document.getElementById('home').classList.add('active');
      renderHome();
    }

    if (apiKey) document.getElementById('apiKey').value = apiKey.slice(0,5) + '***';
    renderHome();
  </script>
</body>
</html>
